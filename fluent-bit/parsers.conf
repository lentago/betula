# =============================================================================
# Zeek log parser
#
# Zeek logs on recent Firewalla firmware are JSON, but may have a leading
# epoch timestamp field. This parser captures the timestamp and passes
# the rest through as JSON fields.
# =============================================================================

[PARSER]
    Name        zeek_tsv
    Format      regex
    Regex       ^(?<ts>[0-9]+\.[0-9]+)\t(?<log>.+)$
    Time_Key    ts
    Time_Format %s.%L
